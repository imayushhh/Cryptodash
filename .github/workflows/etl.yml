name: CryptoDash Daily ETL + Training

on:
  schedule:
    - cron: "0 0 * * *"   # midnight UTC daily
  workflow_dispatch:

jobs:
  etl-and-train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-service/requirements.txt') }}

      - name: Install ETL dependencies
        run: pip install requests pandas numpy psycopg2-binary

      - name: Run daily ETL
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python ai-service/etl_pipeline.py

      - name: Install ML dependencies
        run: pip install scikit-learn tensorflow==2.16.1

      - name: Train LSTM and save predictions
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python ai-service/prediction_trainer.py
