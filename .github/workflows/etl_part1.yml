name: CryptoDash ETL + Training Part 1

on:
  schedule:
    - cron: "0 0 * * *"   # midnight UTC — coins 1-30
  workflow_dispatch:

jobs:
  etl-and-train-part1:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-etl

      - name: Install ETL dependencies
        run: pip install requests pandas numpy psycopg2-binary

      - name: Run daily ETL
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python ai-service/etl_pipeline.py

      - name: Install ML dependencies
        run: pip install scikit-learn tensorflow==2.16.1

      - name: Train coins 1-30
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TF_CPP_MIN_LOG_LEVEL: "3"
          PYTHONWARNINGS: "ignore"
          COIN_BATCH_START: "0"
          COIN_BATCH_END:   "30"
        run: python ai-service/prediction_trainer.py
