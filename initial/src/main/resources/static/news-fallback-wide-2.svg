<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">CryptoDash News Placeholder</title>
  <desc id="desc">Gradient background with abstract shapes for missing news image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="45%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 500C220 420 360 640 620 560C860 486 980 240 1200 280V675H0V500Z" fill="#ffffff" fill-opacity="0.13"/>
  <path d="M0 560C260 500 420 690 700 610C900 554 1020 430 1200 450V675H0V560Z" fill="#ffffff" fill-opacity="0.18"/>

  <rect x="120" y="140" width="960" height="390" rx="24" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.20"/>

  <text x="180" y="290" fill="#f9fafb" font-family="Poppins, Arial, sans-serif" font-size="60" font-weight="700">CryptoDash Headline</text>
  <text x="180" y="360" fill="#e5e7eb" font-family="Poppins, Arial, sans-serif" font-size="30" font-weight="500">Fresh market coverage is on the way.</text>

  <g transform="translate(180 410)">
    <rect x="0" y="0" width="200" height="16" rx="8" fill="#facc15"/>
    <rect x="220" y="0" width="160" height="16" rx="8" fill="#38bdf8"/>
    <rect x="400" y="0" width="140" height="16" rx="8" fill="#86efac"/>
  </g>
</svg>
