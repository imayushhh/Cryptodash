<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480" role="img" aria-labelledby="title desc">
  <title id="title">News Placeholder</title>
  <desc id="desc">Square fallback image for recommended news.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <rect width="480" height="480" fill="url(#bg)"/>
  <circle cx="390" cy="92" r="64" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="44" y="70" width="392" height="340" rx="20" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.20"/>

  <text x="68" y="240" fill="#f8fafc" font-family="Poppins, Arial, sans-serif" font-size="50" font-weight="700">NEWS</text>
  <text x="68" y="285" fill="#cbd5e1" font-family="Poppins, Arial, sans-serif" font-size="26" font-weight="500">CryptoDash</text>
</svg>
